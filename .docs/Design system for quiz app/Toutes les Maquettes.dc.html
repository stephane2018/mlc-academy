<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="font-family:'Lexend',sans-serif; background:#E7EBF1;">

  <!-- master header -->
  <div style="background:#0E1124; color:#fff; padding:46px 40px;">
    <div style="max-width:1180px; margin:0 auto;">
      <div style="display:inline-flex; align-items:center; gap:10px; padding:7px 14px; background:rgba(255,255,255,.1); border-radius:999px; font-size:13px; font-weight:600; color:#C7D2FE;">
        <span style="width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,#6366F1,#8B5CF6); color:#fff; font-family:'Outfit'; font-weight:800; font-size:13px; display:grid; place-items:center;">A</span>
        academy.mathslaclasse.com
      </div>
      <h1 style="font-family:'Outfit'; font-weight:800; font-size:46px; line-height:1.05; letter-spacing:-.02em; margin:22px 0 12px;">Toutes les maquettes</h1>
      <p style="font-size:18px; line-height:1.55; color:#A6ADC9; max-width:680px; margin:0 0 26px;">L'univers élève complet dans la direction artistique indigo. Chaque écran est interactif — fais défiler pour tout parcourir.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <span style="font-family:'Outfit'; font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; background:rgba(99,102,241,.2); color:#C7D2FE;">01 · Dashboard</span>
        <span style="font-family:'Outfit'; font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; background:rgba(99,102,241,.2); color:#C7D2FE;">02 · Onboarding & connexion</span>
        <span style="font-family:'Outfit'; font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; background:rgba(99,102,241,.2); color:#C7D2FE;">03 · Jeu / exercice</span>
        <span style="font-family:'Outfit'; font-weight:600; font-size:13px; padding:7px 14px; border-radius:999px; background:rgba(99,102,241,.2); color:#C7D2FE;">04 · Badges & niveaux</span>
      </div>
    </div>
  </div>

  <dc-import name="Academy - Dashboard Eleve" hint-size="100%,1700px" style="display:block; width:100%;"></dc-import>
  <div style="height:2px; background:#CDD4DF;"></div>
  <dc-import name="Onboarding &amp; Connexion" hint-size="100%,1300px" style="display:block; width:100%;"></dc-import>
  <div style="height:2px; background:#CDD4DF;"></div>
  <dc-import name="Exercice CE1D" hint-size="100%,1200px" style="display:block; width:100%;"></dc-import>
  <div style="height:2px; background:#CDD4DF;"></div>
  <dc-import name="Badges &amp; Niveaux" hint-size="100%,1200px" style="display:block; width:100%;"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1260,&quot;height&quot;:1400}}"></script>
</body>
</html>
